spring.application.name=Lab1-Java-Maven
server.port=8080

# Database (overridden by environment variables in Docker)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/devopslab}
spring.datasource.username=${DB_USER:labuser}
spring.datasource.password=${DB_PASSWORD:labpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.devops=INFO
